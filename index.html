<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量加速器｜Fans168 官方報價</title>
    <style>
        :root {
            --primary: #4c1d95;
            --primary-light: #7c3aed;
            --accent: #d97706;
            --text-main: #1e293b;
            --text-muted: #64748b;

            /* ============ 可自訂區 ============ */
            /* 頂部橫幅底圖：留空字串 '' 就只顯示紫色漸層 */
            --header-image: url('banner.png');
            /* 全頁灰階浮水印底圖 */
            --watermark-image: url('bg.png');
            --watermark-opacity: 0.08;
            /* Apps Script 部署後的網址，貼在這裡 */
            --sheet-api-url: 'https://script.google.com/macros/s/AKfycbw-l_yW0YA6QvL6z_aVfmGM3ke5nz9t_qT6L2McOvtp4cSgHdIfPEsxIzFNfDG6o_Hpaw/exec';
            /* 服務條款連結：改為網頁形式,避免提供可直接下載的 PDF 檔案 */
            --terms-url: 'terms.html';
            /* =================================== */
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f1f5f9;
        }

        /* 全頁灰階浮水印背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: var(--watermark-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(100%);
            opacity: var(--watermark-opacity);
            z-index: -1;
        }

        header {
            width: 100%;
            min-height: 200px;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-image: var(--header-image);
            background-size: cover;
            background-position: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
        }

        header h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            letter-spacing: 4px;
            color: #0f172a;
            text-shadow:
                0 1px 0 rgba(255,255,255,0.9),
                0 2px 4px rgba(255,255,255,0.7),
                0 0 24px rgba(255,255,255,0.55);
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #1e293b;
            text-transform: uppercase;
            text-shadow:
                0 1px 0 rgba(255,255,255,0.9),
                0 0 14px rgba(255,255,255,0.6);
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            padding: 25px;
        }

        .selector-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 15px;
        }

        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.9);
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        select:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .price-list {
            margin-top: 10px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, background-color 0.2s;
            border-radius: 8px;
        }

        .price-item:hover {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(5px);
        }

        .price-item:last-child {
            border-bottom: none;
        }

        .unit-amount {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
        }

        .price-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            text-align: right;
        }

        .price-value span {
            font-size: 14px;
            color: var(--text-muted);
            margin-right: 6px;
            font-weight: 500;
        }

        .status-msg {
            text-align: center;
            color: #64748b;
            padding: 30px 10px;
            font-weight: 500;
        }

        .footer-note {
            text-align: center;
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .policy-links {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0 0;
        }

        .policy-links a {
            color: var(--primary);
            text-decoration: underline;
            font-weight: 600;
            margin: 0 8px;
        }

        .policy-links a:hover {
            color: var(--primary-light);
        }
    </style>
</head>
<body>

<header>
    <h1>流量加速器｜Fans168</h1>
    <p>Premium Digital Growth</p>
</header>

<div class="container">
    <div class="selector-group">
        <label for="platformSelect">Step 1．請選擇平台：</label>
        <select id="platformSelect" disabled>
            <option value="" disabled selected>資料載入中...</option>
        </select>
    </div>

    <div class="selector-group">
        <label for="itemSelect">Step 2．請選擇項目：</label>
        <select id="itemSelect" disabled>
            <option value="" disabled selected>請先選擇平台</option>
        </select>
    </div>

    <div class="price-list" id="priceList">
        <div class="status-msg">請依序選擇平台與項目，即可查看最新報價</div>
    </div>
</div>

<div class="policy-links">
    <a id="termsLink" href="#" target="_blank" rel="noopener noreferrer">Fans168服務條款</a>
</div>

<div class="footer-note">
    © Fans168 Official Pricing
</div>

<script>
    /* ============================================================
     * 資料來源：Google 試算表（透過 Apps Script Web App 提供 JSON）
     * 試算表欄位：platform / item / unit / price
     * 前台只會 fetch 這支 Apps Script 網址，看不到試算表本身，
     * 也連不到建立試算表的 Google 帳號。
     * ============================================================ */
    const SHEET_API_URL = getVar('--sheet-api-url');

    // 展示用備援資料：正式串接成功後會自動被試算表資料取代
    const FALLBACK_DATA = [
      { platform: "FaceBook", item: "台港讚", unit: 50, price: 150 },
      { platform: "FaceBook", item: "台港讚", unit: 100, price: 300 },
      { platform: "FaceBook", item: "台港讚", unit: 200, price: 599 },
      { platform: "FaceBook", item: "全球讚", unit: 100, price: 129 },
      { platform: "FaceBook", item: "全球讚", unit: 300, price: 349 },
      { platform: "Instagram", item: "華人讚 (愛心)", unit: 100, price: 109 },
      { platform: "Instagram", item: "華人讚 (愛心)", unit: 300, price: 289 },
      { platform: "Instagram", item: "全球讚 (愛心)", unit: 100, price: 89 },
      { platform: "YouTube", item: "影片觀看數量", unit: 1000, price: 349 },
      { platform: "YouTube", item: "影片觀看數量", unit: 3000, price: 939 },
    ];

    function getVar(name){
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim().replace(/^['"]|['"]$/g, '');
    }

    // 設定服務條款連結
    document.getElementById('termsLink').href = getVar('--terms-url');

    const platformSelect = document.getElementById('platformSelect');
    const itemSelect = document.getElementById('itemSelect');
    const priceListElement = document.getElementById('priceList');

    let rawRows = [];          // 試算表原始列
    let platformMap = new Map(); // platform -> Map(item -> [{unit, price}])

    async function loadPricing() {
        try {
            const res = await fetch(SHEET_API_URL, { cache: 'no-store' });
            if (!res.ok) throw new Error('連線失敗');
            const rows = await res.json();
            if (!Array.isArray(rows) || rows.length === 0) throw new Error('無資料');
            rawRows = rows;
        } catch (e) {
            console.warn('尚未串接試算表，暫時顯示示範資料：', e.message);
            rawRows = FALLBACK_DATA;
        }
        buildStructure();
        initPlatformMenu();
    }

    // 把扁平列資料組成 平台 -> 項目 -> [{unit, price}] 的巢狀結構
    function buildStructure() {
        platformMap = new Map();
        rawRows.forEach(r => {
            const platform = String(r.platform || '').trim();
            const item = String(r.item || '').trim();
            if (!platform || !item) return;

            if (!platformMap.has(platform)) platformMap.set(platform, new Map());
            const itemMap = platformMap.get(platform);

            if (!itemMap.has(item)) itemMap.set(item, []);
            itemMap.get(item).push({ unit: Number(r.unit), price: Number(r.price) });
        });
    }

    function initPlatformMenu() {
        platformSelect.innerHTML = '<option value="" disabled selected>-- 請選擇平台 --</option>';
        [...platformMap.keys()].forEach(platform => {
            const opt = document.createElement('option');
            opt.value = platform;
            opt.textContent = platform;
            platformSelect.appendChild(opt);
        });
        platformSelect.disabled = false;
        platformSelect.addEventListener('change', onPlatformChange);
    }

    function onPlatformChange() {
        const platform = platformSelect.value;
        const itemMap = platformMap.get(platform);

        itemSelect.innerHTML = '<option value="" disabled selected>-- 請選擇項目 --</option>';
        [...itemMap.keys()].forEach(item => {
            const opt = document.createElement('option');
            opt.value = item;
            opt.textContent = item;
            itemSelect.appendChild(opt);
        });
        itemSelect.disabled = false;
        itemSelect.onchange = () => renderPrices(platform, itemSelect.value);

        priceListElement.innerHTML = '<div class="status-msg">請選擇項目以查看報價</div>';
    }

    function renderPrices(platform, item) {
        if (!item) return;
        const rows = platformMap.get(platform).get(item);

        priceListElement.innerHTML = '';
        rows.forEach(row => {
            const el = document.createElement('div');
            el.className = 'price-item';
            el.innerHTML = `
                <div class="unit-amount">${row.unit.toLocaleString()} 個</div>
                <div class="price-value"><span>NT$</span>${row.price.toLocaleString()}</div>
            `;
            priceListElement.appendChild(el);
        });
    }

    loadPricing();
</script>

</body>
</html>
